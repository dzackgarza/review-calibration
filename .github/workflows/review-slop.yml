# Advisory slop review — calibration repo (issues ledger).
name: Slop Review

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  slop:
    uses: dzackgarza/ai-review-ci/.github/workflows/_review.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: write
      issues: write
    with:
      report_type: slop
      scope: repo
      advisory: true
      context_archive: review-packet.tar
      delivery: issues
      parent_issue: 1
